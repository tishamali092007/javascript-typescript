<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasky — Task Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="scene">
        <div class="app-shell">

            <section class="card list-card">

                <div class="card-topbar">
                    <button class="icon-circle" id="menuBtn" aria-label="Menu">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="topbar-title">
                        <h1>My Tasks</h1>
                        <p id="taskCountText">0 tasks</p>
                    </div>
                    <button class="icon-circle" id="searchToggleBtn" aria-label="Search">
                        <i class="bi bi-search"></i>
                    </button>
                </div>

                <div class="search-row" id="searchRow">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" placeholder="Search tasks…">
                </div>

                <div class="filter-pills" id="filterPills">
                    <button class="pill pill-all active" data-filter="all" type="button">All</button>
                    <button class="pill pill-low" data-filter="low" type="button">Low</button>
                    <button class="pill pill-medium" data-filter="medium" type="button">Medium</button>
                    <button class="pill pill-high" data-filter="high" type="button">High</button>
                </div>

                <div class="list-scroll">
                    <div class="task-list" id="taskList"></div>

                    <div class="empty-state" id="emptyState" hidden>
                        <i class="bi bi-emoji-smile"></i>
                        <h3>All clear!</h3>
                        <p id="emptyStateMsg">Add your first task using the form.</p>
                    </div>
                </div>

                <button class="fab" id="fabAdd" aria-label="Add new task">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </section>

            <section class="card form-card" id="formCard">

                <div class="card-topbar">
                    <button class="icon-circle" id="cancelEditBtn" hidden aria-label="Cancel edit">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <div class="topbar-title">
                        <h1 id="formHeading">Create New Task</h1>
                        <p>Fill in the details below</p>
                    </div>
                    <button class="icon-circle ghost" aria-label="More" tabindex="-1">
                        <i class="bi bi-three-dots"></i>
                    </button>
                </div>

                <form id="taskForm" novalidate>
                    <input type="hidden" id="taskId">

                    <label class="field-label" for="title">Priority</label>
                    <div class="priority-pills" id="priorityPills">
                        <button class="ppill ppill-low" data-priority="low" type="button">
                            <i class="bi bi-circle-fill"></i> Low
                        </button>
                        <button class="ppill ppill-medium active" data-priority="medium" type="button">
                            <i class="bi bi-circle-fill"></i> Medium
                        </button>
                        <button class="ppill ppill-high" data-priority="high" type="button">
                            <i class="bi bi-circle-fill"></i> High
                        </button>
                    </div>
                    <input type="hidden" id="priority" value="medium">

                    <div class="field">
                        <input type="text" id="title" class="pill-input" placeholder="Task title">
                        <span class="error-msg" id="errorTitle">Please enter a task title.</span>
                    </div>

                    <div class="field">
                        <textarea id="description" rows="3" placeholder="Add a description…"></textarea>
                    </div>

                    <label class="field-label">Due Date</label>
                    <div class="field">
                        <div class="date-input">
                            <i class="bi bi-calendar-event"></i>
                            <input type="date" id="dueDate">
                        </div>
                        <span class="error-msg" id="errorDate">Please choose a due date.</span>
                    </div>

                    <button type="submit" class="cta-btn" id="submitBtn">
                        <i class="bi bi-plus-lg"></i> Create Task
                    </button>
                </form>
            </section>

        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>

</html>
